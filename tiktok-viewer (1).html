<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DikTok - Stream Generator</title>
<style>
  :root{
    --bg:#0E0E10;
    --bg-soft:#17171A;
    --line:#26262B;
    --text:#F5F5F5;
    --text-dim:#9A9A9F;
    --pink:#FE2C55;
    --cyan:#25F4EE;
  }
  *{box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,"Hiragino Sans",sans-serif;
    margin:0; padding:0;
    min-height:100vh;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:40px 20px 80px;
  }
  header h1{
    font-size:32px;
    font-weight:800;
    margin:0 0 10px;
    text-align:center;
  }
  header h1 span{
    background:linear-gradient(90deg,var(--cyan),var(--pink));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .description {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 30px;
  }
  .panel{
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
    margin-bottom:30px;
  }
  textarea{
    width:100%;
    height:120px;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px;
    color:var(--text);
    font-size:13px;
    resize:vertical;
    outline:none;
    margin-bottom:15px;
    font-family: monospace;
  }
  textarea::placeholder{
    color:var(--text-dim);
  }
  button{
    width:100%;
    border:none;
    border-radius:10px;
    padding:14px;
    font-size:16px;
    font-weight:700;
    color:#fff;
    background:linear-gradient(90deg,var(--cyan),var(--pink));
    cursor:pointer;
    transition: opacity .15s;
  }
  button:hover{opacity:.9;}
  .info-msg{color:var(--cyan); font-size:14px; margin:10px 0 0; display:none; text-align:center; font-weight: bold;}
  
  /* 動画ストリームの配置 */
  .video-stream{
    display:flex;
    flex-direction:column;
    gap:40px;
    align-items:center;
  }
  .video-card{
    width:100%;
    max-width:350px; /* スマホ縦型サイズに最適化 */
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .video-card iframe {
    width: 100%;
    height: 600px;
    border: none;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>Dik<span>Tok Stream</span></h1>
    <div class="description">エラー対策版：ソースをコピペするだけで動画ストリーム化</div>
  </header>

  <div class="panel">
    <textarea id="source-input" placeholder="【使い方】&#10;1. TikTokで見たい人のプロフィールページを開く&#10;2. 画面の空白部分を右クリック ➔「ページのソースを表示」(または Ctrl+U)&#10;3. 開いたソース画面を全選択(Ctrl+A) して コピー(Ctrl+C)&#10;4. ここに 貼り付け(Ctrl+V) して下のボタンを押す"></textarea>
    <button id="generate-btn">🎬 ストリーム再生を生成する</button>
    <p class="info-msg" id="info-msg"></p>
  </div>

  <div class="video-stream" id="video-stream"></div>
</div>

<script>
(function(){
  const btn = document.getElementById('generate-btn');
  const input = document.getElementById('source-input');
  const stream = document.getElementById('video-stream');
  const infoMsg = document.getElementById('info-msg');

  btn.addEventListener('click', function(){
    const text = input.value;
    if(!text.trim()) return;

    // ソースコードから動画IDを抽出
    const regex = /\/video\/(\d+)/g;
    const videoIds = [];
    let match;

    while ((match = regex.exec(text)) !== null) {
      if (!videoIds.includes(match[1])) {
        videoIds.push(match[1]);
      }
    }

    if (videoIds.length === 0) {
      const idRegex = /\b\d{18,20}\b/g;
      let idMatch;
      while ((idMatch = idRegex.exec(text)) !== null) {
        if (!videoIds.includes(idMatch[0])) {
          videoIds.push(idMatch[0]);
        }
      }
    }

    stream.innerHTML = ''; 

    if (videoIds.length === 0) {
      infoMsg.style.color = '#FE2C55';
      infoMsg.innerText = '動画データが見つかりませんでした。';
      infoMsg.style.display = 'block';
      return;
    }

    infoMsg.style.color = 'var(--cyan)';
    infoMsg.innerText = `🎉 最新の動画を ${videoIds.length} 本読み込みました！下にスクロールしてください。`;
    infoMsg.style.display = 'block';

    // 抽出した動画IDを使って、公式スクリプトに頼らず「直接iframe」を生成
    videoIds.forEach(id => {
      const card = document.createElement('div');
      card.className = 'video-card';
      
      // ポイント1： allow属性でbotチェッカー(mssdk)のセンサーエラーを回避
      // ポイント2： loading="lazy" で画面にスクロールしてきた時だけ読み込む（403ブロック回避）
      card.innerHTML = `
        <iframe src="https://www.tiktok.com/embed/v2/${id}?lang=ja-JP" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen 
                loading="lazy">
        </iframe>
      `;
      stream.appendChild(card);
    });

    input.value = '';
  });
})();
</script>

</body>
</html>
