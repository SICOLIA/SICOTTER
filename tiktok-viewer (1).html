<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DikTok - Video Stream</title>
<style>
  :root{
    --bg:#0E0E10;
    --bg-soft:#17171A;
    --line:#26262B;
    --text:#F5F5F5;
    --text-dim:#9A9A9F;
    --pink:#FE2C55;
    --cyan:#25F4EE;
  }
  *{box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,"Hiragino Sans",sans-serif;
    margin:0; padding:0;
    min-height:100vh;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:40px 20px 80px;
  }
  header h1{
    font-size:32px;
    font-weight:800;
    margin:0 0 20px;
    text-align:center;
  }
  header h1 span{
    background:linear-gradient(90deg,var(--cyan),var(--pink));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .panel{
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
    margin-bottom:30px;
  }
  .field-row{
    display:flex;
    gap:10px;
  }
  .at-input{
    flex:1;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:10px;
    padding:0 14px;
    display:flex;
    align-items:center;
  }
  .at-input input{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-size:16px;
    padding:12px 0;
  }
  button{
    border:none;
    border-radius:10px;
    padding:0 24px;
    font-size:15px;
    font-weight:700;
    background:linear-gradient(90deg,var(--cyan),var(--pink));
    cursor:pointer;
    transition: opacity .15s;
  }
  button:hover{opacity:.9;}
  .error{color:var(--pink); font-size:13px; margin:10px 0 0; display:none;}
  .loading{text-align:center; color:var(--text-dim); display:none; margin:20px 0;}
  
  /* 動画ストリームの配置スタック */
  .video-stream{
    display:flex;
    flex-direction:column;
    gap:30px; /* 動画と動画の間の余白 */
    align-items:center;
  }
  .video-card{
    width:100%;
    max-width:540px;
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
    padding:10px;
    display:flex;
    justify-content:center;
  }
  @media (max-width:480px){
    .field-row{flex-direction:column;}
    button{padding:12px;}
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>Dik<span>Tok Stream</span></h1>
  </header>

  <div class="panel">
    <form id="search-form">
      <div class="field-row">
        <div class="at-input">
          <input type="text" id="handle-input" placeholder="アカウント名を入力 (例: @username)" autocomplete="off">
        </div>
        <button type="submit">動画を読み込む</button>
      </div>
      <p class="error" id="error-msg">動画の取得に失敗しました。アカウント名を確認してください。</p>
    </form>
  </div>

  <div class="loading" id="loading-view">動画を取得中... (数十秒かかる場合があります)</div>
  <div class="video-stream" id="video-stream"></div>
</div>

<script>
(function(){
  // ⚡️ここにあなたのCloudflare WorkersのURLを貼り付けてください⚡️
  const WORKERS_URL = 'https://morning-lab-61b0.powerup4071.workers.dev/'; 

  const form = document.getElementById('search-form');
  const input = document.getElementById('handle-input');
  const errorMsg = document.getElementById('error-msg');
  const loading = document.getElementById('loading-view');
  const stream = document.getElementById('video-stream');

  // TikTokの埋め込みJSを読み込む関数
  function loadTikTokScript() {
    const existing = document.getElementById('tiktok-embed-script');
    if (existing) existing.remove(); // 古いスクリプトを削除して再読み込み

    const s = document.createElement('script');
    s.id = 'tiktok-embed-script';
    s.async = true;
    s.src = 'https://www.tiktok.com/embed.js';
    document.body.appendChild(s);
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const handle = input.value.trim().replace('@', '');
    if(!handle) return;

    errorMsg.style.display = 'none';
    loading.style.display = 'block';
    stream.innerHTML = ''; // 画面をクリア

    try {
      // Cloudflare Workers経由で動画IDを自動取得
      const res = await fetch(`${WORKERS_URL}?handle=${handle}`);
      const data = await res.json();

      if (!data.success || !data.videoIds || data.videoIds.length === 0) {
        throw new Error();
      }

      // 取得した動画IDを元に、最初から再生可能な公式プレイヤーを縦に並べる
      data.videoIds.forEach(id => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
          <blockquote class="tiktok-embed" data-video-id="${id}" style="max-width: 540px; min-width: 325px; margin:0;">
            <section></section>
          </blockquote>
        `;
        stream.appendChild(card);
      });

      // TikTokの埋め込みスクリプトを発火させてプレイヤー化する
      loadTikTokScript();

    } catch (err) {
      errorMsg.style.display = 'block';
    } finally {
      loading.style.display = 'none';
    }
  });
})();
</script>

</body>
</html>
