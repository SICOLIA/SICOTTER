<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DikTok - Stream Generator</title>
<style>
  :root{
    --bg:#0E0E10;
    --bg-soft:#17171A;
    --line:#26262B;
    --text:#F5F5F5;
    --text-dim:#9A9A9F;
    --pink:#FE2C55;
    --cyan:#25F4EE;
  }
  *{box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,"Hiragino Sans",sans-serif;
    margin:0; padding:0;
    min-height:100vh;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:40px 20px 80px;
  }
  header h1{
    font-size:32px;
    font-weight:800;
    margin:0 0 10px;
    text-align:center;
  }
  header h1 span{
    background:linear-gradient(90deg,var(--cyan),var(--pink));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .description {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 30px;
  }
  .panel{
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
    margin-bottom:30px;
  }
  textarea{
    width:100%;
    height:120px;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px;
    color:var(--text);
    font-size:13px;
    resize:vertical;
    outline:none;
    margin-bottom:15px;
    font-family: monospace;
  }
  textarea::placeholder{
    color:var(--text-dim);
  }
  button{
    width:100%;
    border:none;
    border-radius:10px;
    padding:14px;
    font-size:16px;
    font-weight:700;
    color:#fff;
    background:linear-gradient(90deg,var(--cyan),var(--pink));
    cursor:pointer;
    transition: opacity .15s;
  }
  button:hover{opacity:.9;}
  .info-msg{color:var(--cyan); font-size:14px; margin:10px 0 0; display:none; text-align:center; font-weight: bold;}
  
  /* 動画ストリームの配置 */
  .video-stream{
    display:flex;
    flex-direction:column;
    gap:35px;
    align-items:center;
  }
  .video-card{
    width:100%;
    max-width:540px;
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
    padding:10px;
    display:flex;
    justify-content:center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>Dik<span>Tok Stream</span></h1>
    <div class="description">拡張機能・サーバー不要。ソースを1秒コピペするだけで動画ストリーム化</div>
  </header>

  <div class="panel">
    <textarea id="source-input" placeholder="【使い方】&#10;1. TikTokで見たい人のプロフィールページを開く&#10;2. 画面の空白部分を右クリック ➔「ページのソースを表示」(または Ctrl+U)&#10;3. 開いたソース画面を全選択(Ctrl+A) して コピー(Ctrl+C)&#10;4. ここに 貼り付け(Ctrl+V) して下のボタンを押す"></textarea>
    <button id="generate-btn">🎬 ストリーム再生を生成する</button>
    <p class="info-msg" id="info-msg"></p>
  </div>

  <div class="video-stream" id="video-stream"></div>
</div>

<script>
(function(){
  const btn = document.getElementById('generate-btn');
  const input = document.getElementById('source-input');
  const stream = document.getElementById('video-stream');
  const infoMsg = document.getElementById('info-msg');

  function loadTikTokScript() {
    const existing = document.getElementById('tiktok-embed-script');
    if (existing) existing.remove();

    const s = document.createElement('script');
    s.id = 'tiktok-embed-script';
    s.async = true;
    s.src = 'https://www.tiktok.com/embed.js';
    document.body.appendChild(s);
  }

  btn.addEventListener('click', function(){
    const text = input.value;
    if(!text.trim()) return;

    // ソースコードのジャングルから「/video/19桁の動画ID」をすべて自動抽出する
    const regex = /\/video\/(\d+)/g;
    const videoIds = [];
    let match;

    while ((match = regex.exec(text)) !== null) {
      if (!videoIds.includes(match[1])) {
        videoIds.push(match[1]);
      }
    }

    // 万が一URLではなく、動画IDや共有テキストがそのまま貼られた場合も想定して数字単体を補完
    if (videoIds.length === 0) {
      const idRegex = /\b\d{18,20}\b/g;
      let idMatch;
      while ((idMatch = idRegex.exec(text)) !== null) {
        if (!videoIds.includes(idMatch[0])) {
          videoIds.push(idMatch[0]);
        }
      }
    }

    stream.innerHTML = ''; // 前の動画をクリア

    if (videoIds.length === 0) {
      infoMsg.style.color = '#FE2C55';
      infoMsg.innerText = '動画データが見つかりませんでした。貼り付けたデータを確認してください。';
      infoMsg.style.display = 'block';
      return;
    }

    // ユーザーに成功数を通知
    infoMsg.style.color = 'var(--cyan)';
    infoMsg.innerText = `🎉 最新の動画を ${videoIds.length} 本読み込みました！`;
    infoMsg.style.display = 'block';

    // 抽出した動画IDの数だけプレイヤーを生成して縦に並べる
    videoIds.forEach(id => {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.innerHTML = `
        <blockquote class="tiktok-embed" data-video-id="${id}" style="max-width: 540px; min-width: 325px; margin:0;">
          <section></section>
        </blockquote>
      `;
      stream.appendChild(card);
    });

    // 貼り付け欄を空にして画面をスッキリさせる
    input.value = '';

    // TikTok公式スクリプトを実行してプレイヤー化
    loadTikTokScript();
  });
})();
</script>

</body>
</html>
